name: Build YOUNA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip YOUNA_full_project.zip -d project

      - name: Move files
        run: |
          mv project/*/* .
          ls -la

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew || true

      - name: Build APK
        run: ./gradlew assembleDebug || echo "Gradle wrapper missing"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: youna-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
