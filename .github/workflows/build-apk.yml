name: Build YOUNA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          rm -rf project
          unzip -o YOUNA_full_project.zip -d project
          cp -r project/* .
          ls -la
          ls -la app || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build APK
        run: gradle assembleDebug

      - name: Show APK output
        run: ls -R app/build/outputs/apk || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: youna-debug-apk
          path: app/build/outputs/apk/debug/*.apk
